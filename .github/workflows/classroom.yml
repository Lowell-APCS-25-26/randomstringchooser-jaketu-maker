name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: parta1
      id: parta1
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: parta1
        setup-command: ''
        command: gradle test --tests "RandomStringChooserTest.randomStringChooserTest"
        timeout: 10
        max-score: 1
    - name: partb
      id: partb
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: partb
        setup-command: ''
        command: gradle test --tests "RandomLetterChooserTest.randomLetterChooserTest"
        timeout: 10
        max-score: 1
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        PARTA_RESULTS: "${{steps.parta1.outputs.result}}"
        PARTB_RESULTS: "${{steps.partb.outputs.result}}"
      with:
        runners: parta1,partb
